name: Discord Status Ping

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * 1-5"

permissions:
  contents: read

concurrency:
  group: "discord-status-ping"
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether to run now
        id: market_window
        run: |
          python - <<'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("America/New_York"))
          weekday = now.weekday() < 5
          current = now.time()
          should_run = False

          if weekday:
            intraday_start = time(8, 30)
            intraday_end = time(16, 0)
            close_snapshot_start = time(16, 5)
            close_snapshot_end = time(16, 15)
            should_run = intraday_start <= current <= intraday_end or close_snapshot_start <= current <= close_snapshot_end

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Stop outside market window
        if: github.event_name == 'schedule' && steps.market_window.outputs.should_run != 'true'
        run: echo "Outside ET market window, skipping Discord status ping."

      - name: Install minimal dependency
        if: github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true'
        run: pip install requests

      - name: Send Discord status ping
        if: github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TEST_STATUS_PING: "true"
        run: python scripts/send_discord_alerts.py
