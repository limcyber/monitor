name: AI Market Analysis Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  AI_ANALYSIS_TEST_MODE: ${{ vars.AI_ANALYSIS_TEST_MODE }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.market_window.outputs.should_run }}
      has_api_key: ${{ steps.check_key.outputs.has_api_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether to run now
        id: market_window
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("America/New_York"))
          test_mode = os.environ.get("AI_ANALYSIS_TEST_MODE", "true").strip().lower() in {"1", "true", "yes", "on"}

          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
            should_run = True
          elif test_mode:
            should_run = True
          else:
            should_run = now.minute == 0

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Log skipped schedule run
        if: github.event_name == 'schedule' && steps.market_window.outputs.should_run != 'true'
        run: echo "AI refresh skipped: this schedule tick is outside the current run rule."

      - name: Check API key
        id: check_key
        if: github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -n "${GOOGLE_API_KEY}" ]; then
            echo "has_api_key=true" >> "$GITHUB_OUTPUT"
            echo "AI refresh status: GOOGLE_API_KEY detected."
          else
            echo "has_api_key=false" >> "$GITHUB_OUTPUT"
            echo "AI refresh skipped: GOOGLE_API_KEY is missing."
          fi

      - name: Install dependencies
        if: (github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true') && steps.check_key.outputs.has_api_key == 'true'
        run: pip install -r requirements.txt

      - name: Generate AI analysis files
        if: (github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true') && steps.check_key.outputs.has_api_key == 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RUN_AI_ANALYSIS: "true"
          AI_ONLY_MODE: "true"
        run: |
          echo "AI refresh running: generating market AI and watchlist AI files."
          python scripts/generate_report.py

      - name: Commit AI analysis data
        if: (github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true') && steps.check_key.outputs.has_api_key == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest_ai.json docs/data/latest_watchlist_ai.json
          if git diff --cached --quiet; then
            echo "AI refresh result: no file changes."
          else
            git commit -m "chore: refresh ai analysis"
            git push
            echo "AI refresh result: committed and pushed."
          fi

      - name: Upload artifact
        if: (github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true') && steps.check_key.outputs.has_api_key == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name != 'schedule' || needs.build.outputs.should_run == 'true') && needs.build.outputs.has_api_key == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
