name: Market AI Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  workflow_run:
    workflows: ["Market Monitor"]
    types:
      - completed

concurrency:
  group: market-ai-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.mode.outputs.should_run }}
    env:
      AI_ANALYSIS_TEST_MODE: ${{ vars.AI_ANALYSIS_TEST_MODE || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide AI refresh mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "mode=workflow_run" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "AI refresh mode: workflow_run fallback after Market Monitor success."
          else
            MODE="$(printf '%s' "${AI_ANALYSIS_TEST_MODE}" | tr '[:upper:]' '[:lower:]')"
            if [ "$MODE" = "1" ] || [ "$MODE" = "true" ] || [ "$MODE" = "yes" ] || [ "$MODE" = "on" ]; then
              echo "mode=test" >> "$GITHUB_OUTPUT"
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "AI refresh mode: test (every 5 minutes)."
            else
              MINUTE="$(date -u +%M)"
              echo "mode=normal" >> "$GITHUB_OUTPUT"
              if [ "$MINUTE" = "00" ] || [ "$MINUTE" = "30" ]; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "AI refresh mode: normal (every 30 minutes at :00 and :30). Running now."
              else
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                echo "AI refresh mode: normal (every 30 minutes at :00 and :30). Skipping this tick."
              fi
            fi
          fi

      - name: Install dependencies
        if: steps.mode.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Generate AI analysis files
        if: steps.mode.outputs.should_run == 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RUN_AI_ANALYSIS: "true"
          AI_ONLY_MODE: "true"
        run: |
          echo "AI refresh running: generating market AI and watchlist AI files."
          python scripts/generate_report.py

      - name: Send Discord AI alerts
        if: steps.mode.outputs.should_run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_AI_ALERTS: "true"
        run: |
          python scripts/send_discord_alerts.py

      - name: Commit AI analysis data
        if: steps.mode.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add docs/data/latest_ai.json docs/data/latest_watchlist_ai.json docs/data/ai_history.json docs/data/watchlist_ai_history.json
          if git diff --cached --quiet; then
            echo "AI refresh result: no file changes."
          else
            git commit -m "chore: refresh ai analysis"
            git push
            echo "AI refresh result: committed and pushed."
          fi

      - name: Upload artifact
        if: steps.mode.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Skip note
        if: steps.mode.outputs.should_run != 'true'
        run: echo "AI refresh skipped for this schedule tick."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    if: needs.refresh.result == 'success' && needs.refresh.outputs.should_run == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
