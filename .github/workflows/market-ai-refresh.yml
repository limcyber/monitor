name: Market AI Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

concurrency:
  group: market-ai-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.mode.outputs.should_run }}
    env:
      AI_ANALYSIS_TEST_MODE: ${{ vars.AI_ANALYSIS_TEST_MODE || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide AI refresh mode
        id: mode
        run: |
          MODE="$(printf '%s' "${AI_ANALYSIS_TEST_MODE}" | tr '[:upper:]' '[:lower:]')"
          if [ "$MODE" = "1" ] || [ "$MODE" = "true" ] || [ "$MODE" = "yes" ] || [ "$MODE" = "on" ]; then
            echo "mode=test" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "AI refresh mode: test."
          else
            echo "mode=normal" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "AI refresh mode: normal (every 30 minutes at :00 and :30)."
          fi

      - name: Install dependencies
        if: steps.mode.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Generate AI analysis files
        if: steps.mode.outputs.should_run == 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RUN_AI_ANALYSIS: "true"
          AI_ONLY_MODE: "true"
        run: |
          echo "AI refresh running: generating market AI and watchlist AI files."
          python scripts/generate_report.py

      - name: Send Discord AI alerts
        if: steps.mode.outputs.should_run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_AI_ALERTS: "true"
        run: |
          python scripts/send_discord_alerts.py

      - name: Commit AI analysis data
        if: steps.mode.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add docs/data/latest_ai.json docs/data/latest_watchlist_ai.json docs/data/ai_history.json docs/data/watchlist_ai_history.json
          if [ -f docs/data/discord_send_log_us.log ]; then git add docs/data/discord_send_log_us.log; fi
          if git diff --cached --quiet; then
            echo "AI refresh result: no file changes."
          else
            git commit -m "chore: refresh ai analysis"
            git push
            echo "AI refresh result: committed and pushed."
          fi

      - name: Upload artifact
        if: steps.mode.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    if: needs.refresh.result == 'success' && needs.refresh.outputs.should_run == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
