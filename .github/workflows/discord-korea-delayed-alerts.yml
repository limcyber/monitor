name: Discord Korea Delayed Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "5 11 * * 1-5"
    - cron: "5 12 * * 1-5"

permissions:
  contents: read

concurrency:
  group: "discord-korea-delayed-alerts"
  cancel-in-progress: true

jobs:
  alerts:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.window.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether to run delayed Korea alerts now
        id: window
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("America/New_York"))
          weekday = now.weekday() < 5
          minute_of_day = now.hour * 60 + now.minute
          should_run = weekday and (7 * 60 + 5) <= minute_of_day <= (7 * 60 + 15)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Stop outside delayed alert window
        if: github.event_name == 'schedule' && steps.window.outputs.should_run != 'true'
        run: echo "Outside ET 07:05 delayed Korea alert window, skipping."

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.window.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Send delayed Korea important alerts
        if: github.event_name != 'schedule' || steps.window.outputs.should_run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_KR_WEBHOOK_URL }}
          DISCORD_PAYLOAD_PATH: "kr"
          DISCORD_ALERT_TITLE: "한국 시장 오후 중요 알림"
        run: python scripts/send_discord_alerts.py

      - name: Send delayed Korea market summary
        if: github.event_name != 'schedule' || steps.window.outputs.should_run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_KR_WEBHOOK_URL }}
          DISCORD_PAYLOAD_PATH: "kr"
          DISCORD_MARKET_SUMMARY: "true"
          DISCORD_SUMMARY_TITLE: "한국 시장 오후 요약"
        run: python scripts/send_discord_alerts.py
