name: Discord Korea Delayed Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "5 11 * * 1-5"
    - cron: "5 12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: "discord-korea-delayed-alerts"
  cancel-in-progress: true

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send delayed Korea important alerts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_KR_WEBHOOK_URL }}
          DISCORD_PAYLOAD_PATH: "kr"
          DISCORD_ALERT_TITLE: "한국 시장 오후 중요 알림"
        run: python scripts/send_discord_alerts.py

      - name: Send delayed Korea market summary
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_KR_WEBHOOK_URL }}
          DISCORD_PAYLOAD_PATH: "kr"
          DISCORD_MARKET_SUMMARY: "true"
          DISCORD_SUMMARY_TITLE: "한국 시장 오후 요약"
        run: python scripts/send_discord_alerts.py

      - name: Commit Discord log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --source=HEAD --worktree --staged docs/data/latest_kr.json docs/data/history_kr.json
          git pull --rebase --autostash origin main
          if [ -f docs/data/discord_send_log_kr.log ]; then git add docs/data/discord_send_log_kr.log; fi
          git diff --cached --quiet || git commit -m "chore: archive discord korea delayed alerts"
          git push
