name: Market Monitor

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.market_window.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether to run now
        id: market_window
        run: |
          python - <<'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("America/New_York"))
          weekday = now.weekday() < 5
          current = now.time()
          should_run = False

          if weekday:
            intraday_start = time(8, 30)
            intraday_end = time(16, 0)
            close_snapshot_start = time(16, 5)
            close_snapshot_end = time(16, 15)
            should_run = intraday_start <= current <= intraday_end or close_snapshot_start <= current <= close_snapshot_end

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"should_run={'true' if should_run else 'false'}\n")
          PY

      - name: Stop outside market window
        if: github.event_name == 'schedule' && steps.market_window.outputs.should_run != 'true'
        run: echo "Outside ET market window, skipping scheduled run."

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Generate report
        if: github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true'
        run: python scripts/generate_report.py

      - name: Send Discord alerts
        if: (github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true') && secrets.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TEST_STATUS_PING: "true"
        run: python scripts/send_discord_alerts.py

      - name: Upload artifact
        if: github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Commit latest data
        if: github.event_name != 'schedule' || steps.market_window.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json docs/data/history.json
          git diff --cached --quiet || git commit -m "chore: update market snapshot"
          git push

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule' || needs.build.outputs.should_run == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
