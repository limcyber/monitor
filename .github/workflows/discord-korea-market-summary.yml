name: Discord Korea Market Summary

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 0-4"
    - cron: "0 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: "discord-korea-market-summary"
  cancel-in-progress: true

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Korea report
        run: python scripts/generate_kr_report.py

      - name: Send Discord Korea market summary
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_KR_WEBHOOK_URL }}
          DISCORD_MARKET_SUMMARY: "true"
          DISCORD_PAYLOAD_PATH: "kr"
          DISCORD_SUMMARY_TITLE: "한국 시장 상태 요약"
        run: python scripts/send_discord_alerts.py

      - name: Commit Discord log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          if [ -f docs/data/discord_send_log_kr.log ]; then git add docs/data/discord_send_log_kr.log; fi
          git diff --cached --quiet || git commit -m "chore: archive discord korea summary"
          git push
