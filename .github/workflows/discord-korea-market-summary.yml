name: Discord Korea Market Summary

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * 0-4"
    - cron: "0 7 * * 1-5"

permissions:
  contents: read

concurrency:
  group: "discord-korea-market-summary"
  cancel-in-progress: true

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Korea report
        run: python scripts/generate_kr_report.py

      - name: Send Discord Korea market summary
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_KR_WEBHOOK_URL }}
          DISCORD_MARKET_SUMMARY: "true"
          DISCORD_PAYLOAD_PATH: "kr"
          DISCORD_SUMMARY_TITLE: "한국 시장 상태 요약"
        run: python scripts/send_discord_alerts.py
